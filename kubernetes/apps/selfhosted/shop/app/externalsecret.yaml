---
# yaml-language-server: $schema=https://homelab-schemas-epg.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shop
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: shop-secret
    template:
      data:
        # --- App ---
        JWT_SECRET: "{{ .JWT_SECRET }}"
        PUBLIC_URL: "https://shop-stage.${SECRET_DOMAIN}"

        # --- Database (the shared CNPG cluster in db/) ---
        # init-db initContainer creates this database/user on first run.
        # The app then connects via DATABASE_URL.
        INIT_POSTGRES_HOST: "postgres-rw.db.svc.cluster.local"
        INIT_POSTGRES_DBNAME: "{{ .POSTGRES_DB }}"
        INIT_POSTGRES_USER: "{{ .POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .POSTGRES_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        DATABASE_URL: |-
          postgres://{{ .POSTGRES_USER }}:{{ .POSTGRES_PASSWORD }}@postgres-rw.db.svc.cluster.local/{{ .POSTGRES_DB }}?sslmode=disable

        # --- Stripe ---
        STRIPE_SECRET_KEY: "{{ .STRIPE_SECRET_KEY }}"
        STRIPE_WEBHOOK_SECRET: "{{ .STRIPE_WEBHOOK_SECRET }}"

        # --- Cloudflare R2 ---
        R2_ACCOUNT_ID: "{{ .R2_ACCOUNT_ID }}"
        R2_ACCESS_KEY_ID: "{{ .R2_ACCESS_KEY_ID }}"
        R2_SECRET_ACCESS_KEY: "{{ .R2_SECRET_ACCESS_KEY }}"
        R2_BUCKET: "{{ .R2_BUCKET }}"
        R2_PUBLIC_BASE_URL: "{{ .R2_PUBLIC_BASE_URL }}"

        # --- Resend (optional; if blank, emails silently no-op) ---
        RESEND_API_KEY: "{{ .RESEND_API_KEY }}"
        RESEND_FROM_EMAIL: "{{ .RESEND_FROM_EMAIL }}"
  dataFrom:
    - extract:
        key: 3d-shop
    - extract:
        key: cloudnative-pg
