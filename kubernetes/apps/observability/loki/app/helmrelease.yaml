---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: loki
      version: 6.5.2
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  # dependsOn:
  #   - name: rook-ceph-cluster
  #     namespace: rook-ceph
  valuesFrom:
    - targetPath: loki.storage.bucketNames.chunks
      kind: Secret
      name: loki
      valuesKey: bucket
    - targetPath: loki.storage.s3.accessKeyId
      kind: Secret
      name: loki
      valuesKey: access_key
    - targetPath: loki.storage.s3.secretAccessKey
      kind: Secret
      name: loki
      valuesKey: secret_key
    # - targetPath: loki.structuredConfig.common.storage.s3.region
    #   kind: Secret
    #   name: loki
    #   valuesKey: region
    - targetPath: loki.storage.s3.endpoint
      kind: Secret
      name: loki
      valuesKey: endpoint
  values:
    loki:
      ingester:
        max_chunk_age: 1h
        lifecycler:
          ring:
            kvstore:
              store: memberlist
      storage:
        s3:
          s3: null
          # insecure: true
          # s3forcepathstyle: true
      schemaConfig:
        configs:
          - from: "2022-01-11" # quote
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      structuredConfig:
        auth_enabled: false
        server:
          log_level: info
          http_listen_port: 3100
          grpc_listen_port: 9095
        # memberlist:
        #   join_members: ["loki-memberlist"]
        limits_config:
          ingestion_burst_size_mb: 128
          ingestion_rate_mb: 64
          max_query_parallelism: 100
          per_stream_rate_limit: 64M
          per_stream_rate_limit_burst: 128M
          reject_old_samples: true
          reject_old_samples_max_age: 168h
          retention_period: 7d
          shard_streams:
            enabled: true
          split_queries_by_interval: 1h
        ruler:
          enable_api: true
          enable_alertmanager_v2: true
          alertmanager_url: http://alertmanager.observability.svc.cluster.local:9093
          storage:
            type: local
            local:
              directory: /rules
          rule_path: /rules/fake
        analytics:
          reporting_enabled: false
    backend:
      replicas: 3
      persistence:
        size: 20Gi
        storageClass: longhorn
    gateway:
      replicas: 3
      image:
        registry: ghcr.io
      ingress:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: &host loki.phekno.io
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host
    read:
      replicas: 3
    write:
      replicas: 3
      persistence:
        storageClass: longhorn
        size: 100Gi
    sidecar:
      image:
        repository: ghcr.io/kiwigrid/k8s-sidecar
      rules:
        searchNamespace: ALL
        folder: /rules/fake
    lokiCanary:
      enabled: false
    test:
      enabled: false
