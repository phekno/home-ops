---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: &app datadog
spec:
  interval: 30m
  chart:
    spec:
      chart: datadog
      # version: 1.6.0
      sourceRef:
        kind: HelmRepository
        name: datadog
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    apiKeyExistingSecret: datadog
