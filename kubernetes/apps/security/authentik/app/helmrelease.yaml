---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: authentik
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: 2024.4.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    deploymentAnnotations:
      secret.reloader.stakater.com/reload: authentik-secret,authentik-redis-secret
    initContainers:
      init-db:
        image: ghcr.io/onedr0p/postgres-init:16.3
        envFrom: &envFrom
          - secretRef:
              name: authentik-secret
    authentik:
      log_level: info
      email:
        port: 587
        use_tls: true
      error_reporting:
        enabled: false
        send_pii: false
      redis:
        host: "authentik-redis.security.svc.cluster.local"
        password: ""
    server:
      envFrom: *envFrom
    ingress:
      enabled: true
      ingressClassName: external
      annotations:
        external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
      hosts:
        - host: &host "sso.${SECRET_DOMAIN}"
          paths:
            - path: /
      tls:
        - hosts:
            - *host
    postgresql:
      enabled: false
    prometheus:
      rules:
        create: true
      serviceMonitor:
        create: true
    redis:
      enabled: false
