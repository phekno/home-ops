---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gobin
  namespace: downloads
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      gobin:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/phekno/gobin
              tag: 0.3.5@sha256:9c9295eb7940929d3f25a365efa30ed9f3d3a3cb53f5818783980bc01d861897
            env:
              TZ: "America/Chicago"
              USENET_HOST:
                valueFrom:
                  secretKeyRef:
                    name: gobin-secret
                    key: USENET_HOST
              USENET_USER:
                valueFrom:
                  secretKeyRef:
                    name: gobin-secret
                    key: USENET_USER
              USENET_PASS:
                valueFrom:
                  secretKeyRef:
                    name: gobin-secret
                    key: USENET_PASS
              GOBIN_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: gobin-secret
                    key: GOBIN_API_KEY
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            resources:
              requests:
                memory: 512Mi
              limits:
                memory: 4Gi
    service:
      app:
        ports:
          http:
            port: *port
          metrics:
            port: 9090
    serviceMonitor:
      app:
        serviceName: gobin
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.phekno.io"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      config:
        existingClaim: gobin
      config-file:
        type: configMap
        name: gobin-configmap
        globalMounts:
          - path: /config/config.yaml
            subPath: config.yaml
            readOnly: true
      downloads:
        type: nfs
        server: 10.100.50.10
        path: /tank/nzbget_downloads
        globalMounts:
          - path: /downloads
      tmp:
        type: emptyDir
