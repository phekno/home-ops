---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: multus-iot
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "multus-iot",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eno3",
          "mode": "bridge",
          "capabilities": {
            "ips": true
          },
          "ipam": {
            "type": "dhcp",
            "subnet": "10.100.30.0/24",
            "rangeStart": "10.100.30.90",
            "rangeEnd": "10.100.30.100",
            "routes": [
              { "dst": "0.0.0.0/0" }
            ],
            "gateway": "10.100.30.1"
          }
        }
      ]
    }
