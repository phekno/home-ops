---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ebay-watcher
  namespace: utilities
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: utilities
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      ebay-watcher:
        annotations:
          secret.reloader.stakater.com/reload: ebay-watcher
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom:
              - secretRef:
                  name: ebay-watcher
        containers:
          app:
            image:
              repository: ghcr.io/phekno/ebay-watcher
              tag: 0.2.7@sha256:a91768b5b6da4d9151bc73df0d7301f2d859fa9745840ce9a8af780c60eae29f
            env:
              TZ: America/Chicago
              HTTP_PORT: "8080"
              POLL_INTERVAL: "1h"
            envFrom:
              - secretRef:
                  name: ebay-watcher
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]

        pod:
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
            fsGroup: 65534
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: ebay-watcher
        ports:
          http:
            port: 8080

    ingress: {}   # using HTTPRoute below
