---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ebay-watcher
  namespace: utilities
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: utilities
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      ebay-watcher:
        annotations:
          secret.reloader.stakater.com/reload: ebay-watcher
        containers:
          app:
            image:
              repository: ghcr.io/phekno/ebay-watcher
              tag: 0.1.0@sha256:7f2000f4adac41ecb891ff86fe9ce18af045124c10c8c1f8d7aeddf06d12ac08
            env:
              TZ: America/Chicago
              HTTP_PORT: "8080"
              POLL_INTERVAL: "1h"
              DATABASE_PATH: /data/seen.db
            envFrom:
              - secretRef:
                  name: ebay-watcher
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]

        pod:
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
            fsGroup: 65534
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: ebay-watcher
        ports:
          http:
            port: 8080

    ingress: {}   # using HTTPRoute below

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /data
