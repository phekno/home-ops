---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ebay-watcher
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/utilities/ebay-watcher/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-ops
  wait: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
