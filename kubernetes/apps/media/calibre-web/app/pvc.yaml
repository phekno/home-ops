---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-web
  namespace: media
  labels:
    app.kubernetes.io/name: &name calibre-web
    app.kubernetes.io/instance: *name
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
